name: tci-git-repo-connection

services:
  postgres:
    image: postgres:18.3
    container_name: tci-postgres-test
    restart: unless-stopped
    shm_size: 256mb
    environment:
      POSTGRES_USER: tci
      POSTGRES_PASSWORD: tci
      POSTGRES_DB: tci_test
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - ${TCI_DOCKER_DATA_ROOT}/test/postgresql:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tci -d tci_test"]
      interval: 10s
      timeout: 5s
      retries: 10
